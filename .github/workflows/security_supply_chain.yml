name: Security Supply Chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -c requirements.lock
          python -m pip install flwr==1.8.0 --no-deps

      - name: Run local supply-chain audit
        run: make supply-chain-audit

      - name: Run OWASP GenAI safety regression suite
        run: make ai-safety-eval

      - name: Run model-card disclosure check
        run: make model-card-check

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neurosight-supply-chain-report
          path: |
            logs/security/neurosight_supply_chain_report.json
            logs/safety/neurosight_ai_safety_report.json
            logs/model_card/neurosight_model_card_report.json
          if-no-files-found: error
