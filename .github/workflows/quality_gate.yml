name: Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -c requirements.lock
          python -m pip install flwr==1.8.0 --no-deps

      - name: Run offline CI/CD quality gate
        run: make quality

      - name: Upload quality gate report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: neurosight-quality-gate-report
          path: logs/quality/neurosight_quality_gate_report.json
          if-no-files-found: error
