[pytest]
markers =
    unit: fast unit tests
    integration: essential integration tests
    slow: CPU-heavy or long-running tests
    benchmark: benchmark and baseline execution tests
    safety: safety audit and red-team tests
    quality: code/evaluation quality gate tests
    frontend: frontend integration or check tests

testpaths = tests
python_files = test_*.py
addopts = -m "not slow" --strict-markers -v --tb=short --timeout=300
